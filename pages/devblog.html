<body style="user-select: none;">
    <!-- LOADER -->

    <div id="loader">
        <div class="loader-mask">
            <div class="loader-fill"></div>
        </div>
    </div>

    <div class="topbar">
        <p>This a <strong>work in-progress</strong></p>
    </div>


    <main>
        <div class="top">
            <a class="logo-top" href="../index.html">
                <img id="shop-icon" src="../assets/logo-black.png">
            </a>

            <div class="pages popup">
                <a href="./games.html"><span>GAMES</span></a>
                <a style="user-select: none;"><span>DEVBLOG</span></a>
            </div>

            <div class="inter">
                <a class="popup" href="#search">
                    <img src="https://unpkg.com/lucide-static@latest/icons/search.svg" />
                </a>
                <a class="popup" href="#user">
                    <img src="https://unpkg.com/lucide-static@latest/icons/user-round.svg" />
                </a>
            </div>
        </div>

        <div class="sub-top popup">RECENT BLOGS</div>

        <!-- Main Contents -->
        <section class="display">
            <div class="grid" id="devblog-list">



                <!-- <h1 class="popup" style="text-align: center;">Coming Soon</h1> -->
            </div>

        </section>
    </main>



    <!-- Template -->
    <template id="devblog_template">
        <div class="card popup">
            <img class="gameimg popup" src="../assets/placeholder.png" />
            <div class="card-content popup">
                <h3 class="title">NO TITLE</h3>
                <span class="date">NO DATE</span>
            </div>
        </div>
    </template>




</body>


<!-- MODAL -->
<div id="blog-modal" class="modal-overlay">
    <div class="modal-box">
        <button class="modal-close">✕</button>
        <img class="modal-img" src="" />
        <div class="modal-content">
            <h3 class="modal-title"></h3>
            <span class="modal-date"></span>
            <p class="modal-description"></p>
        </div>
    </div>
